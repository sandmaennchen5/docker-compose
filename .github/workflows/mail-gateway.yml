name: Build & Push Mail Gateway

on:
  push:
    branches:
      - main
    paths:
      - "mail-gateway/**"
      - ".github/workflows/mail-gateway.yml"
    tags:
      - "mail-gateway/v*"
  pull_request:
    branches:
      - main
    paths:
      - "mail-gateway/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mail-gateway

jobs:
  build:
    name: Build & Push (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag v1.2.3 → :1.2.3 and :1.2 and :1
            type=semver,pattern={{version}},prefix=,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/mail-gateway/') }}
            type=semver,pattern={{major}}.{{minor}},prefix=,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/mail-gateway/') }}
            type=semver,pattern={{major}},prefix=,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/mail-gateway/') }}
            # SHA for traceability
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./mail-gateway
          file: ./mail-gateway/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
