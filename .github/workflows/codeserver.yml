name: Auto Build Code-Server (LinuxServer Upstream)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "codeserver/**"
      - ".github/workflows/build.yml"

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest upstream version (GitHub Releases)
        id: check
        run: |
          echo "🔍 Checking LinuxServer.io GitHub releases..."

          UPSTREAM=$(curl -s \
            "https://api.github.com/repos/linuxserver/docker-code-server/releases" \
            | jq -r '.[0].tag_name')

          echo "Raw upstream tag: $UPSTREAM"

          VERSION=$(echo "$UPSTREAM" | sed 's/-ls[0-9]*$//')

          echo "Parsed version: $VERSION"

          # Manual workflow always builds
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🚀 Manual workflow - forcing build"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -f codeserver/upstream_version.txt ]; then
            LAST=$(cat codeserver/upstream_version.txt)
          else
            LAST="none"
          fi

          echo "Last build: $LAST"

          if [ "$VERSION" != "$LAST" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./codeserver
          file: ./codeserver/Dockerfile
          push: true
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/codeserver:latest
            ghcr.io/${{ github.repository }}/codeserver:${{ needs.check-upstream.outputs.version }}

      - name: Generate Changelog
        run: |
          echo "## Changes in version ${{ needs.check-upstream.outputs.version }}" > release.md
          echo "" >> release.md
          echo "- Upstream LinuxServer.io updated to version **${{ needs.check-upstream.outputs.version }}**" >> release.md
          echo "- Auto-built via GitHub Actions" >> release.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check-upstream.outputs.version }}
          name: Release ${{ needs.check-upstream.outputs.version }}
          body_path: release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save upstream version
        run: echo "${{ needs.check-upstream.outputs.version }}" > codeserver/upstream_version.txt

      - name: Commit upstream version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add codeserver/upstream_version.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update upstream to ${{ needs.check-upstream.outputs.version }}"
          git push