name: Auto Build Code-Server (LinuxServer Upstream)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest upstream version (Docker Hub)
        id: check
        run: |
          echo "🔍 Checking Docker Hub upstream version..."

          # Docker Hub liefert IMMER gültige JSON-Daten
          UPSTREAM=$(curl -s \
            "https://hub.docker.com/v2/repositories/linuxserver/code-server/tags?page_size=1" \
            | jq -r '.results[0].name')

          echo "Raw upstream tag: $UPSTREAM"

          # Suffix wie -ls346 entfernen
          VERSION=$(echo "$UPSTREAM" | sed 's/-ls[0-9]*$//')

          echo "Parsed version: $VERSION"

          if [ -f upstream_version.txt ]; then
            LAST=$(cat upstream_version.txt)
          else
            LAST="none"
          fi

          echo "Last build: $LAST"

          if [ "$VERSION" != "$LAST" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Upstream changed → build required"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No change → skipping build"
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save new upstream version
        run: echo "${{ needs.check-upstream.outputs.version }}" > upstream_version.txt
