name: Build and Push Code-Server Image

on:
  schedule:
    - cron: "0 */6 * * *"   # alle 6 Stunden
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest upstream version (GHCR)
        id: check
        run: |
          echo "🔍 Checking GHCR upstream version..."

          UPSTREAM=$(curl -s "https://ghcr.io/v2/linuxserver/code-server/tags/list" \
            | jq -r '.tags[]' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1)

          echo "Latest upstream: $UPSTREAM"

          if [ -f upstream_version.txt ]; then
            LAST=$(cat upstream_version.txt)
          else
            LAST="none"
          fi

          echo "Last build: $LAST"

          if [ "$UPSTREAM" != "$LAST" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$UPSTREAM" >> $GITHUB_OUTPUT
            echo "Upstream changed → build required"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No change → skipping build"
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save new upstream version
        run: echo "${{ needs.check-upstream.outputs.version }}" > upstream_version.txt

      - name: Commit upstream version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add upstream_version.txt
          git commit -m "Update upstream to ${{ needs.check-upstream.outputs.version }}" || true
          git push || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          pull: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codeserver:latest
            ghcr.io/${{ github.repository_owner }}/codeserver:${{ needs.check-upstream.outputs.version }}
