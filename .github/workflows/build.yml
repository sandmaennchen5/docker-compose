name: Build and Push Code-Server Image

on:
  schedule:
    - cron: "0 */6 * * *"   # alle 6 Stunden prüfen
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - name: Get latest upstream tag
        id: check
        run: |
          UPSTREAM=$(curl -s https://registry.hub.docker.com/v2/repositories/lscr.io/linuxserver/code-server/tags | jq -r '.results[0].name')
          echo "Latest upstream: $UPSTREAM"

          if [ -f upstream_version.txt ]; then
            LAST=$(cat upstream_version.txt)
          else
            LAST="none"
          fi

          if [ "$UPSTREAM" != "$LAST" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$UPSTREAM" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save new upstream version
        run: echo "${{ needs.check-upstream.outputs.version }}" > upstream_version.txt

      - name: Commit upstream version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add upstream_version.txt
          git commit -m "Update upstream to ${{ needs.check-upstream.outputs.version }}" || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codeserver:latest
            ghcr.io/${{ github.repository_owner }}/codeserver:${{ needs.check-upstream.outputs.version }}
          pull: true
